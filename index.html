<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolimons API Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Space Grotesk"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #060a08;
            --bg-card: rgba(10, 20, 14, 0.88);
            --bg-card-hover: rgba(14, 28, 20, 0.92);
            --bg-input: rgba(6, 12, 9, 0.9);
            --border: rgba(0, 230, 118, 0.08);
            --border-hover: rgba(0, 230, 118, 0.25);
            --accent: #00e676;
            --accent-dim: #00c853;
            --accent-glow: rgba(0, 230, 118, 0.12);
            --gold: #ffc107;
            --gold-dim: #ff9800;
            --text: #e0e8e4;
            --text-muted: #5a7066;
            --text-dim: #3a4a42;
            --success: #00e676;
            --error: #ff5252;
            --warning: #ffab40;
            --info: #40c4ff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,230,118,0.08), transparent 70%);
            top: -100px; left: -100px;
            animation: orbFloat1 20s ease-in-out infinite;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,193,7,0.06), transparent 70%);
            bottom: -50px; right: -50px;
            animation: orbFloat2 25s ease-in-out infinite;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0,230,118,0.05), transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: orbFloat3 18s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(80px, 60px); }
            66% { transform: translate(-40px, 100px); }
        }
        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-60px, -80px); }
            66% { transform: translate(50px, -40px); }
        }
        @keyframes orbFloat3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 260px;
            background: rgba(6, 10, 8, 0.95);
            border-right: 1px solid var(--border);
            z-index: 50;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            transition: transform 0.3s ease;
        }

        .sidebar-logo {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            position: relative;
            overflow: hidden;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
            opacity: 0;
            transform: scaleY(0);
            transition: all 0.2s ease;
        }
        .nav-item:hover {
            color: var(--text);
            background: var(--accent-glow);
        }
        .nav-item.active {
            color: var(--accent);
            background: var(--accent-glow);
        }
        .nav-item.active::before {
            opacity: 1;
            transform: scaleY(1);
        }
        .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 15px;
        }
        .nav-item .deprecated-badge {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 4px;
            background: rgba(255,82,82,0.15);
            color: var(--error);
            font-weight: 600;
            margin-left: auto;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Main content */
        .main-content {
            margin-left: 260px;
            padding: 32px 40px;
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.25s ease;
        }
        .card:hover {
            border-color: var(--border-hover);
        }

        /* Inputs */
        .input-field {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: all 0.2s ease;
        }
        .input-field::placeholder {
            color: var(--text-dim);
        }
        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            color: #060a08;
            font-weight: 600;
            font-size: 14px;
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Grotesk', sans-serif;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(0,230,118,0.25);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Space Grotesk', sans-serif;
        }
        .btn-secondary:hover {
            color: var(--text);
            border-color: var(--border-hover);
            background: var(--accent-glow);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-success { background: rgba(0,230,118,0.12); color: var(--success); }
        .badge-error { background: rgba(255,82,82,0.12); color: var(--error); }
        .badge-warning { background: rgba(255,171,64,0.12); color: var(--warning); }
        .badge-info { background: rgba(64,196,255,0.12); color: var(--info); }
        .badge-gold { background: rgba(255,193,7,0.12); color: var(--gold); }
        .badge-dim { background: rgba(90,112,102,0.15); color: var(--text-muted); }

        /* Stat card */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.25s ease;
        }
        .stat-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        .data-table thead th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 2;
        }
        .data-table tbody tr {
            transition: background 0.15s ease;
        }
        .data-table tbody tr:hover {
            background: var(--accent-glow);
        }
        .data-table tbody td {
            padding: 10px 16px;
            font-size: 13px;
            border-bottom: 1px solid rgba(0,230,118,0.04);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Loading spinner */
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(0,230,118,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(20px);
            border: 1px solid;
            animation: toastIn 0.3s ease;
            min-width: 280px;
            max-width: 420px;
        }
        .toast-success {
            background: rgba(0,230,118,0.08);
            border-color: rgba(0,230,118,0.2);
            color: var(--success);
        }
        .toast-error {
            background: rgba(255,82,82,0.08);
            border-color: rgba(255,82,82,0.2);
            color: var(--error);
        }
        .toast-info {
            background: rgba(64,196,255,0.08);
            border-color: rgba(64,196,255,0.2);
            color: var(--info);
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Page sections */
        .page-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .page-section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,230,118,0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,230,118,0.3); }

        /* Table wrapper */
        .table-wrapper {
            max-height: 520px;
            overflow-y: auto;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        /* Trade ad card */
        .trade-ad-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
        }
        .trade-ad-card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
        }

        /* Tag */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin: 2px;
        }
        .tag-green { background: rgba(0,230,118,0.12); color: var(--success); }
        .tag-gold { background: rgba(255,193,7,0.12); color: var(--gold); }
        .tag-blue { background: rgba(64,196,255,0.12); color: var(--info); }
        .tag-red { background: rgba(255,82,82,0.12); color: var(--error); }
        .tag-dim { background: rgba(90,112,102,0.15); color: var(--text-muted); }

        /* Mobile hamburger */
        .hamburger {
            display: none;
            position: fixed;
            top: 16px; left: 16px;
            z-index: 60;
            width: 42px; height: 42px;
            border-radius: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        /* RAP change visual */
        .rap-change-positive { color: var(--success); }
        .rap-change-negative { color: var(--error); }

        /* Pulse dot */
        .pulse-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,230,118,0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0,230,118,0); }
        }

        /* Section header line */
        .section-line {
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            border: none;
            margin: 8px 0 0 0;
            border-radius: 1px;
        }

        /* Item thumbnail */
        .item-thumb {
            width: 40px; height: 40px;
            border-radius: 8px;
            object-fit: cover;
            background: rgba(0,230,118,0.05);
            border: 1px solid var(--border);
        }

        /* Detail row */
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .detail-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 24px 16px; padding-top: 70px; }
            .hamburger { display: flex; }
        }

        /* Overlay for mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 40;
        }
        .sidebar-overlay.active { display: block; }

        /* Raw data block */
        .raw-data-block {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            max-height: 300px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
        }

        /* Deprecated notice */
        .deprecated-notice {
            background: rgba(255,82,82,0.06);
            border: 1px solid rgba(255,82,82,0.15);
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 13px;
            color: var(--error);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Background effects -->
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Mobile hamburger -->
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background: var(--accent-glow); border: 1px solid var(--border-hover);">
                    <i class="fas fa-gem" style="color: var(--accent); font-size: 15px;"></i>
                </div>
                <div>
                    <div class="text-sm font-bold" style="color: var(--text);">Rolimons API</div>
                    <div class="text-xs" style="color: var(--text-dim);">Tool Suite v1.0</div>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="text-xs font-semibold uppercase tracking-wider px-3 py-2" style="color: var(--text-dim);">Endpoints</div>
            <div class="nav-item active" data-page="dashboard">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </div>
            <div class="nav-item" data-page="itemDetails">
                <i class="fas fa-search"></i>
                <span>Item Details</span>
            </div>
            <div class="nav-item" data-page="allItems">
                <i class="fas fa-boxes-stacked"></i>
                <span>All Items</span>
            </div>
            <div class="nav-item" data-page="tradeAds">
                <i class="fas fa-arrows-rotate
